  <text x="80" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" fill="#1a1a1a">local service businesses.</text>
  <!-- Subtext -->
  <text x="80" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#777">useable.studio</text>
